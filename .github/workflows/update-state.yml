name: Update L3RAIN dashboard state

# Writes state.json from your repo state so the Command Center dashboard
# reflects reality. Runs on every push, when other workflows finish, and
# every 5 minutes. Adjust the "Build state.json" step to compute real values.

on:
  push:
  workflow_run:
    workflows: ["*"]
    types: [completed]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: l3rain-state
  cancel-in-progress: true

jobs:
  update-state:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build state.json
        run: |
          # ---- EDIT THIS BLOCK to compute real values for your project ----
          # Department status values: working | error | waiting | idle | opening | done
          cat > state.json <<'JSON'
          {
            "phases": [
              { "name": "PHASE 0 · PREPARATION", "pct": 100 },
              { "name": "PHASE 1 · PLANNING", "pct": 100 },
              { "name": "PHASE 2 · EXECUTION", "pct": 74 },
              { "name": "PHASE 3 · VALIDATION", "pct": 41 },
              { "name": "PHASE 4 · OPTIMIZATION", "pct": 12 }
            ],
            "departments": {
              "orchestrator": "working",
              "engineering": "working",
              "infra": "working",
              "integrations": "waiting",
              "customer": "idle",
              "marketing": "working",
              "csuite": "opening"
            },
            "feed": [
              { "k": "Repo state", "v": "clean", "c": "#4ade80" },
              { "k": "GH Actions", "v": "run OK", "c": "#4ade80" },
              { "k": "Resume-queue", "v": "active", "c": "#67e8f9" },
              { "k": "Waker", "v": "armed", "c": "#facc15" }
            ]
          }
          JSON
          # ----------------------------------------------------------------

      - name: Commit if changed
        run: |
          git config user.name "l3rain-bot"
          git config user.email "actions@github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update dashboard state [skip ci]"
          git push
