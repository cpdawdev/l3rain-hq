<title>L3RAIN HQ — Command Center</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230b1224'/%3E%3Ctext x='16' y='23' font-size='20' text-anchor='middle' fill='%2367e8f9'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E">

<!--
  L3RAIN HQ Command Center — clean vanilla rebuild (no build step, no React, no CDNs).

  Files:
    index.html   this page: markup + styles
    app.js       the whole dashboard: side panel + isometric office simulation
    sprites.js   window.L3RAIN_SPRITES = { role: dataURI } — 30 chibi face images
    fonts/       Chakra Petch woff2 (self-hosted, no external requests)
    legacy.html  the previous artifact-bundle build, kept for behavior diffing

  Script ordering (the chibi-face race fix):
    Both scripts use `defer`, so the browser guarantees sprites.js executes
    BEFORE app.js, and both after the DOM is parsed. app.js therefore never
    reads window.L3RAIN_SPRITES before it exists. If sprites.js fails to load
    entirely, app.js draws initials avatars instead — a face is never blank.

  Live feed:
    app.js polls FEED_URL (arch-docs Worker /status.json) every 30 s and falls
    back to an embedded snapshot + demo animation while the feed is unreachable.
    URL params: ?feed=<url> ?poll=<ms> ?speed=<0.4-2.5> ?shadows=0
-->

/* ---------- base ---------- */
html, body { margin: 0; padding: 0; background: #060913; }
* { box-sizing: border-box; }
a { color: #67e8f9; text-decoration: none; }
a:hover { color: #a5f3fc; }

#l3-outer {
  min-height: 100vh;
  background: radial-gradient(1200px 700px at 50% 30%, #0b1224 0%, #060913 70%);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  font-family: 'Chakra Petch', 'Segoe UI', sans-serif;
}
#l3-shell {
  position: relative; width: 1900px; max-width: 100%;
  background: #0a0f1e; border: 2px solid #2b4a74; border-radius: 24px;
  box-shadow: 0 0 46px rgba(64,156,255,.16), inset 0 0 80px rgba(24,48,96,.28);
  overflow: hidden;
}

/* ---------- header ---------- */
.hq-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 26px 10px 26px; }
.hq-brand { display: flex; align-items: center; gap: 12px; }
.hq-logo {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, #38bdf8, #7c3aed);
  display: flex; align-items: center; justify-content: center;
  color: #eaf6ff; font-weight: 700; font-size: 16px;
}
.hq-title { color: #eaf4ff; font-size: 22px; font-weight: 700; letter-spacing: 3px; }
.hq-title .hq-sub { color: #5f7ca6; font-size: 13px; letter-spacing: 2px; font-weight: 500; }
#hq-clock { color: #9fd8ff; font-size: 20px; font-weight: 600; letter-spacing: 2px; }

/* ---------- usage-cap banner (hidden unless capActive) ---------- */
#l3-cap-banner {
  display: none; align-items: center; gap: 11px;
  margin: 0 26px 10px 26px; padding: 9px 15px;
  border: 1px solid #ff8a2a; border-radius: 12px;
  background: linear-gradient(90deg, rgba(255,138,42,.22), rgba(255,138,42,.06));
  box-shadow: 0 0 22px rgba(255,138,42,.28);
}
#l3-cap-banner.on { display: flex; }
.cap-dot { width: 11px; height: 11px; border-radius: 50%; flex: 0 0 auto; background: #ff8a2a; box-shadow: 0 0 11px #ff8a2a; }
.cap-label { color: #ffd9b3; font-size: 12.5px; font-weight: 700; letter-spacing: 1.5px; }
#hq-cap-msg { color: #ffe6cc; font-size: 12px; letter-spacing: .4px; }

/* ---------- layout row: side panel + office map ---------- */
#l3-row { display: flex; gap: 14px; padding: 0 16px 16px 16px; align-items: stretch; }
#l3-panel {
  width: 252px; flex: 0 0 auto;
  background: rgba(13,20,38,.92); border: 1px solid #243a5e; border-radius: 16px;
  padding: 14px; display: flex; flex-direction: column; gap: 13px;
}

/* phases */
#hq-phases { display: flex; flex-direction: column; gap: 9px; }
.phase { display: flex; flex-direction: column; gap: 3px; }
.phase-head { display: flex; justify-content: space-between; color: #b9d2f2; font-size: 10.5px; letter-spacing: 1px; }
.phase-head .pct { color: #67e8f9; }
.bar { height: 9px; border-radius: 5px; background: #12203a; border: 1px solid #1f3a63; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, #22d3ee, #3b82f6); width: 0%; }

/* 5-hour usage */
#l3-usage { display: flex; flex-direction: column; gap: 5px; border: 1px solid #1f3a63; border-radius: 10px; padding: 8px 10px; background: #0c1526; }
.usage-head { display: flex; justify-content: space-between; color: #b9d2f2; font-size: 10.5px; letter-spacing: 1px; }
.usage-pct-wrap { display: inline-flex; align-items: baseline; gap: 4px; }
#hq-usage-pct { color: #67e8f9; }
.usage-mode { color: #7d94b8; font-size: 9px; letter-spacing: .5px; text-transform: uppercase; }
.usage-times { display: flex; justify-content: space-between; font-size: 9px; color: #7d94b8; letter-spacing: .5px; }
.usage-reset-row { display: flex; justify-content: space-between; font-size: 10px; }
.usage-reset-row .k { color: #7d94b8; }
#hq-usage-count { color: #67e8f9; font-weight: 600; }
#hq-usage-weekly { font-size: 9px; color: #7d94b8; letter-spacing: .5px; text-align: right; }

/* overall completion donut */
.donut-wrap { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 9px 0; border-top: 1px solid #1c3050; border-bottom: 1px solid #1c3050; }
.panel-heading { color: #8fb4dd; font-size: 11px; letter-spacing: 2px; }
#hq-donut {
  width: 104px; height: 104px; border-radius: 50%;
  background: conic-gradient(#22d3ee 0deg, rgba(76,201,255,.12) 0deg);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 22px rgba(56,189,248,.25);
}
#hq-donut-inner {
  width: 78px; height: 78px; border-radius: 50%; background: #0d1426;
  display: flex; align-items: center; justify-content: center;
  color: #e7f6ff; font-size: 24px; font-weight: 700;
}

/* departments */
.dept-section { display: flex; flex-direction: column; gap: 6px; }
#hq-depts { display: flex; flex-direction: column; gap: 6px; }
.dept-row { display: flex; align-items: center; gap: 8px; }
.dept-dot { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; border: 1px solid rgba(255,255,255,.25); }
.dept-name { color: #dbe9fb; font-size: 12px; flex: 1; }
.dept-status { color: #7d94b8; font-size: 9.5px; letter-spacing: 1px; text-transform: uppercase; }

/* employee activity + live data feed boxes */
.side-box { display: flex; flex-direction: column; gap: 5px; border: 1px solid #1f3a63; border-radius: 10px; padding: 8px 10px; background: #0c1526; }
.box-heading { color: #67e8f9; font-size: 10px; letter-spacing: 2px; }
.kv { display: flex; justify-content: space-between; font-size: 10.5px; }
.kv .k { color: #7d94b8; }
#hq-act-total { color: #e7f6ff; }
#hq-act-work { color: #3ee06b; }
#hq-act-move { color: #67e8f9; }
#hq-act-break { color: #facc15; }
#hq-feed-box { margin-top: auto; gap: 4px; }
#hq-feed { display: flex; flex-direction: column; gap: 4px; }

/* office map */
#l3-canvaswrap {
  flex: 1; min-width: 0; position: relative;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(160deg, #0e1730, #0a1020);
  border: 1px solid #243a5e; border-radius: 16px; overflow: hidden;
}
#l3rain-canvas { display: block; width: 100%; height: auto; touch-action: none; }
.canvas-hint {
  position: absolute; left: 12px; bottom: 10px;
  display: flex; align-items: center; gap: 8px;
  color: #5f7ca6; font-size: 10px; letter-spacing: 1px; pointer-events: none;
}
.canvas-hint span { padding: 3px 7px; border: 1px solid #26436b; border-radius: 6px; background: rgba(9,14,28,.6); }
.zoom-controls { position: absolute; right: 12px; bottom: 10px; display: flex; gap: 6px; }
.zoom-controls button {
  border: 1px solid #26436b; border-radius: 8px; background: rgba(9,14,28,.75);
  color: #9fd8ff; cursor: pointer; font-family: inherit;
}
#l3-zin, #l3-zout { width: 30px; height: 30px; font-size: 17px; line-height: 1; }
#l3-zreset { height: 30px; padding: 0 10px; font-size: 11px; letter-spacing: 1px; }

/* ---------- responsive (same breakpoints as the old build) ---------- */
@media (max-width: 900px) {
  #l3-shell { border-radius: 0 !important; border-left: none !important; border-right: none !important; }
  #l3-row { flex-direction: column-reverse !important; }
  #l3-panel { width: 100% !important; flex-direction: row !important; flex-wrap: wrap !important; gap: 10px !important; }
  #l3-panel > div { flex: 1 1 46% !important; min-width: 150px !important; }
  #l3-outer { padding: 0 !important; }
}
@media (max-width: 560px) {
  #l3-panel > div { flex: 1 1 100% !important; }
}
/* Landscape phone / short viewport: keep panel beside the map, fit the map to height */
@media (orientation: landscape) and (max-height: 600px) {
  #l3-outer { padding: 0 !important; align-items: stretch !important; }
  #l3-shell { width: 100% !important; min-height: 100vh; height: 100vh; display: flex; flex-direction: column; }
  #l3-row { flex-direction: row !important; flex: 1 1 auto; min-height: 0; padding: 0 8px 8px 8px !important; }
  #l3-panel { width: 186px !important; flex: 0 0 186px !important; flex-direction: column !important; flex-wrap: nowrap !important; overflow-y: auto; padding: 10px !important; gap: 9px !important; }
  #l3-panel > div { flex: 0 0 auto !important; min-width: 0 !important; }
  #l3-canvaswrap { height: 100%; }
  #l3rain-canvas { width: auto !important; height: 100% !important; max-width: 100% !important; margin: 0 auto; }
}
</style>
</head>
<body>

<div id="l3-outer" data-screen-label="L3RAIN HQ v3">
  <div id="l3-shell">

    <div class="hq-header">
      <div class="hq-brand">
        <div class="hq-logo">✦</div>
        <div class="hq-title">L3RAIN <span class="hq-sub">— HEADQUARTERS V3.0</span></div>
      </div>
      <div id="hq-clock">--:--</div>
    </div>

    <div id="l3-cap-banner">
      <span class="cap-dot"></span>
      <span class="cap-label">USAGE CAP ACTIVE</span>
      <span id="hq-cap-msg"></span>
    </div>

    <div id="l3-row">
      <div id="l3-panel">

        <div id="hq-phases"><!-- phase rows rendered by app.js --></div>

        <div id="l3-usage">
          <div class="usage-head"><span>5-HOUR USAGE</span><span class="usage-pct-wrap"><span id="hq-usage-pct">—</span><span id="hq-usage-mode" class="usage-mode"></span></span></div>
          <div class="bar"><div class="bar-fill" id="hq-usage-bar"></div></div>
          <div class="usage-times"><span id="hq-usage-start">Start —</span><span id="hq-usage-reset">Reset —</span></div>
          <div class="usage-reset-row"><span class="k">Resets in</span><span id="hq-usage-count">—</span></div>
          <div id="hq-usage-weekly" style="display:none"></div>
        </div>

        <div class="donut-wrap">
          <div class="panel-heading">OVERALL COMPLETION</div>
          <div id="hq-donut"><div id="hq-donut-inner">0%</div></div>
        </div>

        <div class="dept-section">
          <div class="panel-heading">DEPARTMENTS</div>
          <div id="hq-depts"><!-- department rows rendered by app.js --></div>
        </div>

        <div class="side-box">
          <div class="box-heading">EMPLOYEE ACTIVITY</div>
          <div class="kv"><span class="k">Active agents</span><span id="hq-act-total">30</span></div>
          <div class="kv"><span class="k">At workstations</span><span id="hq-act-work">0</span></div>
          <div class="kv"><span class="k">Collaborating / moving</span><span id="hq-act-move">0</span></div>
          <div class="kv"><span class="k">On short break</span><span id="hq-act-break">0</span></div>
        </div>

        <div class="side-box" id="hq-feed-box">
          <div class="box-heading">LIVE DATA FEED</div>
          <div id="hq-feed"><!-- feed rows rendered by app.js --></div>
        </div>

      </div>

      <div id="l3-canvaswrap">
        <canvas id="l3rain-canvas" width="1600" height="920"></canvas>
        <div class="canvas-hint"><span>SCROLL / PINCH ZOOM · DRAG PAN · DBL-CLICK RESET</span></div>
        <div class="zoom-controls">
          <button id="l3-zin" title="Zoom in">+</button>
          <button id="l3-zout" title="Zoom out">−</button>
          <button id="l3-zreset" title="Reset view">RESET</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- defer guarantees order: sprites.js defines window.L3RAIN_SPRITES BEFORE app.js boots -->
<script src="sprites.js" defer></script>
<script src="app.js" defer></script>

</body>
</html>
