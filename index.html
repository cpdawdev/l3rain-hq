  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ts[k];\n      let txt = null, col = '#0b1220';\n      if (st === 'waiting') { txt = 'waiting'; col = '#a86a00'; }\n      else if (st === 'opening') { txt = '?'; col = '#2a5fa8'; }\n      else if (st === 'error') { txt = '!'; col = '#c0263a'; }\n      if (!txt) continue;\n      const a = this.agents.find(g => g.dept === k && g.state !== 'walk') || this.agents.find(g => g.dept === k);\n      if (!a) continue;\n      const e = this.elevAt(a.pos.x, a.pos.y);\n      const p = this.isoE(a.pos.x, a.pos.y, e);\n      const bob = Math.sin(t * 2 + a.seed) * 1.5;\n      this.bubble(ctx, p.x + 16, p.y - 78 + bob, txt, col);\n    }\n  }\n  bubble(ctx, x, y, txt, col) {\n    ctx.font = '700 10px \"Chakra Petch\", sans-serif';\n    const w = ctx.measureText(txt).width + 14, h = 17;\n    this.rr(ctx, x - w / 2, y - h, w, h, 6); ctx.fillStyle = 'rgba(248,251,255,.96)'; ctx.fill();\n    ctx.strokeStyle = 'rgba(120,150,190,.7)'; ctx.lineWidth = 1; ctx.stroke();\n    ctx.beginPath(); ctx.moveTo(x - 3, y - 1); ctx.lineTo(x + 4, y - 1); ctx.lineTo(x - 2, y + 5); ctx.closePath(); ctx.fillStyle = 'rgba(248,251,255,.96)'; ctx.fill();\n    ctx.fillStyle = col; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(txt, x, y - h / 2);\n  }\n\n  lowWallItems(items) {\n    const glowLo = 'rgba(140,200,255,.4)', fill = '#6b7characters'.slice(0, 0) + '#6b7699';\n    for (const k in this.ROOMS) {\n      const r = this.ROOMS[k]; const e = r.elev || 0;\n      const [x1, y1, x2, y2] = r.rect;\n      const on = (wall) => r.doors.filter(d => d.wall === wall).map(d => d.c);\n      const seg = (edge, a, b) => {\n        if (edge === 'S') items.push({ d: (a + b) / 2 + y2 + 0.4, draw: (c) => this.wallSeg(c, this.isoE(a, y2, e), this.isoE(b, y2, e), 12, fill, glowLo) });\n        else if (edge === 'E') items.push({ d: x2 + (a + b) / 2 + 0.4, draw: (c) => this.wallSeg(c, this.isoE(x2, a, e), this.isoE(x2, b, e), 12, fill, glowLo) });\n        else if (edge === 'N') items.push({ d: (a + b) / 2 + y1 - 0.4, draw: (c) => this.wallSeg(c, this.isoE(a, y1, e), this.isoE(b, y1, e), 12, fill, glowLo) });\n        else items.push({ d: x1 + (a + b) / 2 - 0.4, draw: (c) => this.wallSeg(c, this.isoE(x1, a, e), this.isoE(x1, b, e), 12, fill, glowLo) });\n      };\n      for (const [a, b] of this.segments(x1, x2, on('S'))) seg('S', a, b);\n      for (const [a, b] of this.segments(y1, y2, on('E'))) seg('E', a, b);\n      if (!r.tallN) for (const [a, b] of this.segments(x1, x2, on('N'))) seg('N', a, b);\n      if (!r.tallW) for (const [a, b] of this.segments(y1, y2, on('W'))) seg('W', a, b);\n    }\n  }\n\n  furnitureItems(items, t) {\n    const on = (k) => { const s = this.DATA.departments[k]; return s !== 'done' && s !== 'idle'; };\n    for (const k of ['engineering', 'infra', 'integrations', 'customer', 'marketing']) {\n      const lit = on(k);\n      for (const [dx, dy] of this.DESKS[k]) {\n        items.push({\n          d: dx + dy, draw: (ctx) => {\n            this.box(ctx, dx - 2.8, dy - 1.2, 5.6, 2.4, 11, '#e2e6ee');\n            this.box(ctx, dx - 1, dy - 1, 2, 0.6, 12, '#12151f');\n            if (lit) { const p = this.iso(dx, dy - 0.7); ctx.fillStyle = 'rgba(103,232,249,' + (0.3 + 0.16 * Math.sin(t * 3 + dx)) + ')'; ctx.beginPath(); ctx.ellipse(p.x, p.y - 15, 7, 3, 0, 0, 7); ctx.fill(); }\n            // chair\n            this.box(ctx, dx - 1.2, dy + 1.6, 2.4, 2.4, 7, '#3a4straight'.slice(0, 0) + '#3a4463');\n          }\n        });\n      }\n    }\n    items.push({ d: 117 + 97, draw: (ctx) => { this.box(ctx, 104, 94, 26, 6, 12, '#6a4a30', { stroke: 'rgba(0,0,0,.3)' }); } });\n    for (let i = 0; i < 4; i++) { const x = 62 + i * 9; items.push({ d: x + 2, draw: (ctx) => { this.box(ctx, x, 1.5, 5, 2.6, 30, '#1c2740', { stroke: '#3b4c78' }); const p = this.iso(x + 2.5, 4); for (let r = 0; r < 4; r++) for (let c = 0; c < 3; c++) { const o = Math.sin(t * 3 + x + r * 2 + c) > 0; ctx.fillStyle = o ? (c === 2 ? '#3ee06b' : '#67e8f9') : '#26365a'; ctx.beginPath(); ctx.arc(p.x - 8 + c * 8, p.y - 26 + r * 6, 1.6, 0, 7); ctx.fill(); } } }); }\n    items.push({ d: 92 + 44, draw: (ctx) => { this.box(ctx, 86, 43.5, 13, 2.6, 14, '#c8d2dc'); this.box(ctx, 88.5, 43.8, 2.2, 1.8, 22, '#2a2f3a'); const p = this.iso(89.5, 44.6); ctx.fillStyle = Math.sin(t * 2) > 0 ? '#ff4d5e' : '#5a2a30'; ctx.beginPath(); ctx.arc(p.x, p.y - 19, 1.8, 0, 7); ctx.fill(); } });\n    items.push({ d: 106 + 44, draw: (ctx) => { this.box(ctx, 104.5, 43.5, 3.4, 2.4, 25, '#43305c', { stroke: 'rgba(168,85,247,.5)' }); const p = this.iso(106.2, 45.7); ctx.fillStyle = 'rgba(196,181,253,.5)'; ctx.fillRect(p.x - 5, p.y - 24, 10, 14); } });\n    items.push({ d: 92 + 62, draw: (ctx) => { this.box(ctx, 90.5, 60.8, 3, 2.8, 9, '#cdd6e0'); } });\n    items.push({ d: 104 + 62, draw: (ctx) => { this.box(ctx, 102.5, 60.8, 3, 2.8, 9, '#cdd6e0'); } });\n    items.push({ d: 127 + 45, draw: (ctx) => { this.box(ctx, 121, 43.6, 3, 1.8, 11, '#aeb9c6'); this.box(ctx, 129, 43.6, 3, 1.8, 11, '#aeb9c6'); } });\n    items.push({ d: 6 + 53, draw: (ctx) => { this.box(ctx, 3.5, 51.5, 6, 2.8, 10, '#9a7a54'); this.box(ctx, 3.5, 51, 6, 1, 16, '#7e6142'); } });\n    items.push({ d: 14 + 53, draw: (ctx) => { this.box(ctx, 11.5, 51.5, 6, 2.8, 10, '#9a7a54'); this.box(ctx, 11.5, 51, 6, 1, 16, '#7e6142'); } });\n    items.push({ d: 10 + 61, draw: (ctx) => { this.box(ctx, 8, 59.8, 4, 2.8, 7, '#5a5240'); } });\n    items.push({ d: 4 + 68, draw: (ctx) => { this.box(ctx, 3, 67, 1.8, 1.6, 6, '#7a4a30'); const p = this.iso(3.9, 67.8); ctx.fillStyle = '#3f8a52'; ctx.beginPath(); ctx.arc(p.x - 4, p.y - 12, 5, 0, 7); ctx.arc(p.x + 4, p.y - 12, 5, 0, 7); ctx.arc(p.x, p.y - 17, 5, 0, 7); ctx.fill(); } });\n    items.push({ d: 26 + 104, draw: (ctx) => { this.box(ctx, 22, 102.5, 7, 2.8, 10, '#8a6b52'); } });\n    items.push({ d: 39 + 103, draw: (ctx) => { this.box(ctx, 38, 101.8, 2.4, 2, 17, '#33436a', { stroke: 'rgba(103,232,249,.5)' }); const p = this.iso(39.2, 103.5); ctx.fillStyle = 'rgba(103,232,249,.55)'; ctx.fillRect(p.x - 4, p.y - 16, 8, 6); } });\n    items.push({ d: 62 + 81.5, draw: (ctx) => { this.box(ctx, 60, 80.9, 5, 0.9, 20, '#1a2b48', { stroke: 'rgba(103,232,249,.45)' }); const p = this.iso(62.5, 81.3); ctx.fillStyle = 'rgba(143,220,240,.45)'; for (let i = 0; i < 3; i++) ctx.fillRect(p.x - 10, p.y - 18 + i * 5, 14 - i * 3, 2); } });\n    items.push({ d: 95 + 35, draw: (ctx) => { this.box(ctx, 94, 34.5, 2.2, 1.4, 15, '#2e6ea8', { stroke: 'rgba(103,232,249,.6)' }); const p = this.iso(95.1, 35.2); ctx.fillStyle = '#9fe6ff'; ctx.beginPath(); ctx.arc(p.x, p.y - 12, 2, 0, 7); ctx.fill(); } });\n    // orchestrator console (on platform)\n    items.push({ d: 53 + 58.5, draw: (ctx) => { this.box(ctx, 50, 57.4, 6, 2, 11, '#2a2050', { stroke: 'rgba(139,92,246,.7)', e: 16 }); } });\n    // potted plants in room corners\n    const plant = (px, py, big) => items.push({\n      d: px + py, draw: (ctx) => {\n        this.box(ctx, px - 0.9, py - 0.9, 1.8, 1.8, big ? 6 : 5, '#7a4a30');\n        const p = this.iso(px, py); const R = big ? 6 : 5;\n        ctx.fillStyle = '#3f8a52'; ctx.beginPath(); ctx.arc(p.x - R * 0.7, p.y - 12, R, 0, 7); ctx.arc(p.x + R * 0.7, p.y - 12, R, 0, 7); ctx.arc(p.x, p.y - 12 - R, R, 0, 7); ctx.fill();\n        ctx.fillStyle = '#4fa866'; ctx.beginPath(); ctx.arc(p.x, p.y - 13 - R * 0.6, R * 0.6, 0, 7); ctx.fill();\n      }\n    });\n    plant(49, 3, true); plant(96, 3); plant(133, 3, true); plant(90, 84); plant(134, 84, true); plant(2, 84);\n    // customer bookshelf (docs)\n    items.push({ d: 2 + 86, draw: (ctx) => { this.box(ctx, 1, 84, 2, 6, 22, '#5a4433', { stroke: 'rgba(0,0,0,.3)' }); const p = this.iso(2, 87); for (let i = 0; i < 4; i++) { ctx.fillStyle = ['#c26', '#2a8', '#c93', '#48c'][i]; ctx.fillRect(p.x - 6, p.y - 20 + i * 4.5, 12, 3); } } });\n    // marketing design easel\n    items.push({ d: 62 + 90, draw: (ctx) => { this.box(ctx, 61, 88, 4, 0.8, 18, '#8a6b4a'); const p = this.iso(63, 88.4); ctx.fillStyle = '#eef0f4'; ctx.fillRect(p.x - 7, p.y - 17, 14, 12); ctx.strokeStyle = '#d96a4f'; ctx.lineWidth = 1.4; ctx.beginPath(); ctx.arc(p.x, p.y - 11, 4, 0, 7); ctx.stroke(); } });\n    // entrance mat\n    items.push({ d: 46 + 110.6, draw: (ctx) => { const p1 = this.iso(43, 110), p2 = this.iso(49, 110), p3 = this.iso(50, 113), p4 = this.iso(42, 113); ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); ctx.closePath(); ctx.fillStyle = 'rgba(103,232,249,.14)'; ctx.fill(); ctx.strokeStyle = 'rgba(103,232,249,.4)'; ctx.stroke(); ctx.font = '600 9px \"Chakra Petch\", sans-serif'; ctx.fillStyle = '#7fd6ea'; ctx.textAlign = 'center'; const m = this.iso(46, 112.6); ctx.fillText('MAIN ENTRANCE', m.x, m.y + 10); } });\n  }\n\n  drawRugs(ctx) {\n    const rugs = [\n      { r: [3, 58, 18, 71], c: 'rgba(150,92,60,.3)', b: 'rgba(200,150,110,.4)' },     // lounge\n      { r: [103, 91, 131, 108], c: 'rgba(110,80,46,.34)', b: 'rgba(180,140,90,.45)' }, // c-suite under table\n      { r: [18, 100, 31, 109], c: 'rgba(80,104,150,.28)', b: 'rgba(140,175,220,.4)' }, // customer\n      { r: [39, 99, 53, 110], c: 'rgba(80,116,160,.24)', b: 'rgba(130,180,220,.36)' }, // collab hub\n      { r: [87, 60, 109, 71], c: 'rgba(120,128,146,.22)', b: 'rgba(170,180,200,.34)' } // cafeteria\n    ];\n    for (const g of rugs) {\n      this.floorPoly(ctx, g.r[0], g.r[1], g.r[2], g.r[3], 0);\n      ctx.fillStyle = g.c; ctx.fill();\n      ctx.strokeStyle = g.b; ctx.lineWidth = 1.4; ctx.setLineDash([6, 5]); ctx.stroke(); ctx.setLineDash([]);\n    }\n  }\n\n  wallDeco(ctx, t) {\n    const face = (x1, x2, top, bot, fill, stroke) => {\n      const a = this.iso(x1, 0), b = this.iso(x2, 0);\n      ctx.beginPath(); ctx.moveTo(a.x, a.y - top); ctx.lineTo(b.x, b.y - top); ctx.lineTo(b.x, b.y - bot); ctx.lineTo(a.x, a.y - bot); ctx.closePath();\n      ctx.fillStyle = fill; ctx.fill(); ctx.strokeStyle = stroke; ctx.lineWidth = 1; ctx.stroke();\n      return { a, b };\n    };\n    // engineering windows\n    face(4, 24, 52, 20, 'rgba(120,170,220,.35)', 'rgba(180,220,255,.6)');\n    ctx.strokeStyle = 'rgba(210,235,255,.5)'; ctx.lineWidth = 1; ctx.beginPath();\n    for (let i = 0; i < 6; i++) { const q = this.iso(6 + i * 3, 0); ctx.moveTo(q.x, q.y - 50); ctx.lineTo(q.x, q.y - 22); } ctx.stroke();\n    // engineering blueprint monitor\n    face(28, 42, 50, 24, 'rgba(13,30,55,.92)', 'rgba(103,232,249,.55)');\n    ctx.strokeStyle = 'rgba(103,232,249,.5)'; ctx.beginPath();\n    const eb = this.iso(30, 0); ctx.moveTo(eb.x, eb.y - 30 - 6 * Math.sin(t)); ctx.lineTo(this.iso(41, 0).x, this.iso(41, 0).y - 40 + 5 * Math.sin(t + 1)); ctx.stroke();\n    // infra world map\n    face(62, 82, 52, 22, 'rgba(10,26,48,.94)', 'rgba(59,130,246,.6)');\n    ctx.fillStyle = 'rgba(62,224,107,.55)';\n    for (let i = 0; i < 8; i++) { const q = this.iso(64 + (i * 2.3) % 18, 0); ctx.beginPath(); ctx.arc(q.x, q.y - 46 + (i * 7) % 22, 1.6 + Math.sin(t * 2 + i) * 0.5, 0, 7); ctx.fill(); }\n    // infra dashboards\n    face(84, 98, 50, 24, 'rgba(12,20,40,.92)', 'rgba(103,232,249,.5)');\n    // integrations portal\n    const e = this.iso(122, 0);\n    const pg = ctx.createRadialGradient(e.x, e.y - 36, 2, e.x, e.y - 36, 17);\n    pg.addColorStop(0, 'rgba(196,181,253,.95)'); pg.addColorStop(1, 'rgba(76,29,149,.05)');\n    ctx.fillStyle = pg; ctx.beginPath(); ctx.ellipse(e.x, e.y - 36, 12, 16, 0, 0, 7); ctx.fill();\n    ctx.strokeStyle = 'rgba(196,181,253,.85)'; ctx.lineWidth = 1.8; ctx.beginPath(); ctx.ellipse(e.x, e.y - 36, 12, 16, 0, t, t + 4); ctx.stroke();\n    // customer window (W wall)\n    const cwa = this.iso(0, 88), cwb = this.iso(0, 104);\n    ctx.beginPath(); ctx.moveTo(cwa.x, cwa.y - 46); ctx.lineTo(cwb.x, cwb.y - 46); ctx.lineTo(cwb.x, cwb.y - 22); ctx.lineTo(cwa.x, cwa.y - 22); ctx.closePath();\n    ctx.fillStyle = 'rgba(120,170,220,.28)'; ctx.fill(); ctx.strokeStyle = 'rgba(180,220,255,.5)'; ctx.stroke();\n    // marketing whiteboards (N wall)\n    face(62, 90, 50, 24, 'rgba(232,236,242,.95)', 'rgba(150,170,200,.7)');\n    ctx.strokeStyle = 'rgba(70,110,180,.7)'; ctx.lineWidth = 1.2; ctx.beginPath();\n    const mb = this.iso(66, 0); ctx.moveTo(mb.x, mb.y - 42); ctx.lineTo(mb.x + 40, mb.y - 34); ctx.moveTo(mb.x, mb.y - 34); ctx.lineTo(mb.x + 26, mb.y - 30); ctx.stroke();\n    ctx.strokeStyle = 'rgba(200,90,90,.8)'; ctx.beginPath(); ctx.arc(mb.x + 60, mb.y - 36, 6, 0, 7); ctx.stroke();\n    // c-suite art (warm)\n    face(100, 134, 50, 24, 'rgba(60,42,28,.9)', 'rgba(180,150,100,.6)');\n    ctx.fillStyle = 'rgba(200,170,110,.4)';\n    const ca = this.iso(112, 0); ctx.fillRect(ca.x, ca.y - 46, 26, 18);\n  }\n\n  holo(ctx, t) {\n    const p = this.isoE(53, 57, 16); const y = p.y - 42;\n    ctx.save(); ctx.globalAlpha = 0.9;\n    const g = ctx.createRadialGradient(p.x, y, 2, p.x, y, 40);\n    g.addColorStop(0, 'rgba(103,232,249,.42)'); g.addColorStop(1, 'rgba(103,232,249,0)');\n    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(p.x, y, 40, 0, 7); ctx.fill();\n    ctx.strokeStyle = 'rgba(103,232,249,.7)'; ctx.lineWidth = 1.4;\n    ctx.beginPath(); ctx.ellipse(p.x, y, 30, 11, 0, 0, 7); ctx.stroke();\n    ctx.strokeStyle = 'rgba(167,139,250,.8)'; ctx.beginPath(); ctx.ellipse(p.x, y, 37, 14, 0, t * 1.2, t * 1.2 + 1.8); ctx.stroke();\n    ctx.fillStyle = 'rgba(103,232,249,.9)';\n    for (let i = 0; i < 6; i++) { const ang = t * 0.9 + i * 1.05; ctx.beginPath(); ctx.arc(p.x + Math.cos(ang) * 30, y + Math.sin(ang) * 11, 1.8, 0, 7); ctx.fill(); }\n    ctx.font = '700 11px \"Chakra Petch\", sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(143,220,240,.95)';\n    ctx.fillText('ORCHESTRATOR', p.x, y - 20);\n    ctx.restore();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
